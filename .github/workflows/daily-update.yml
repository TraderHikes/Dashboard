name: TraderHikes Daily Data Pipeline

on:
  schedule:
    # All times shifted off the top-of-hour to avoid GitHub's scheduled-run
    # congestion (runs at :00 UTC are most often delayed/dropped).
    # Cron is in UTC; IST = UTC + 5:30.
    - cron: '43 1 * * 1-5'    #  7:13 AM IST — PRE-MARKET BRIEF
    - cron: '13 3 * * 1-5'    #  8:43 AM IST — pre-market brief (safety-net retry)
    - cron: '13 4 * * 1-5'    #  9:43 AM IST — intraday
    - cron: '13 5 * * 1-5'    # 10:43 AM IST — intraday
    - cron: '13 6 * * 1-5'    # 11:43 AM IST — intraday
    - cron: '13 7 * * 1-5'    # 12:43 PM IST — intraday
    - cron: '13 8 * * 1-5'    #  1:43 PM IST — intraday
    - cron: '13 9 * * 1-5'    #  2:43 PM IST — intraday
    - cron: '13 10 * * 1-5'   #  3:43 PM IST — full EOD (market close)
    - cron: '13 11 * * 1-5'   #  4:43 PM IST — full EOD (safety-net retry)
    - cron: '23 14 * * 1-5'   #  7:53 PM IST — FII/DII
    - cron: '43 14 * * 1-5'   #  8:13 PM IST — FII/DII (retry)

  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode (premarket / intraday / full_eod / fii_dii / score_only)'
        required: false
        default: 'full_eod'

permissions:
  contents: read

jobs:
  update-dashboard:
    name: Fetch NSE Data & Update Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance supabase pandas pytz requests

      # Decide RUN_MODE explicitly per slot so the pipeline never has to guess.
      # Manual runs use the dispatch input; scheduled runs are mapped by IST hour
      # to match the cron schedule above.
      # NOTE: 'score_only' is a manual/dispatch-only mode (no cron). It is fired
      # on demand by the Supabase Edge Function 'recompute-score' whenever Key
      # Indices are saved in the Admin Panel or FII/DII data changes (DB webhook).
      # It re-runs ONLY compute_market_score() using the latest stored breadth
      # tallies + fresh manual FII/DII + index data — seconds, no Nifty-500 fetch.
      - name: Determine run mode
        id: mode
        run: |
          MANUAL="${{ github.event.inputs.run_mode }}"
          if [ -n "$MANUAL" ]; then
            MODE="$MANUAL"
          else
            HOUR=$(TZ='Asia/Kolkata' date '+%H')   # IST hour, 24h, zero-padded
            HOUR=$((10#$HOUR))                      # force base-10 (avoid octal)
            if   [ "$HOUR" -ge 5 ]  && [ "$HOUR" -le 8 ];  then MODE="premarket"
            elif [ "$HOUR" -ge 9 ]  && [ "$HOUR" -le 14 ]; then MODE="intraday"
            elif [ "$HOUR" -eq 15 ] || [ "$HOUR" -eq 16 ]; then MODE="full_eod"
            elif [ "$HOUR" -eq 19 ] || [ "$HOUR" -eq 20 ]; then MODE="fii_dii"
            else MODE="full_eod"
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Resolved RUN_MODE=$MODE (IST $(TZ='Asia/Kolkata' date '+%H:%M'))"

      - name: Run data pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BRIEF_MODEL: ${{ secrets.ANTHROPIC_BRIEF_MODEL }}
          RUN_MODE: ${{ steps.mode.outputs.mode }}
        run: |
          python update_dashboard.py

      - name: Done
        if: success()
        run: echo "Pipeline complete - $(TZ='Asia/Kolkata' date '+%d %b %Y - %I:%M %p IST')"

      - name: Failed
        if: failure()
        run: echo "Pipeline failed. Check logs above."
